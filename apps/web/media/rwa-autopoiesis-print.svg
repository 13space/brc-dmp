<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Autopoiesis Diagram Print</title>
  <desc id="desc">A signed diagram print sample for RWA templates.</desc>
  <rect width="900" height="620" fill="#f7f7f4"/>
  <rect x="120" y="66" width="660" height="488" fill="#fffefa" stroke="#171717" stroke-width="6"/>
  <circle cx="450" cy="310" r="148" fill="none" stroke="#267a57" stroke-width="10"/>
  <circle cx="392" cy="270" r="46" fill="#c98518"/>
  <circle cx="508" cy="350" r="46" fill="#2d5f9a"/>
  <path d="M410 240 C500 204 580 260 548 340" fill="none" stroke="#171717" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M490 382 C398 418 318 358 352 276" fill="none" stroke="#171717" stroke-width="8" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#171717"/>
