  </defs>
  <text x="148" y="112" font-family="ui-monospace, Menlo, monospace" font-size="23" fill="#171717">AUTOPOIESIS PRINT / AP 1-3</text>
  <text x="562" y="514" font-family="cursive" font-size="28" fill="#60666d">13space</text>
